name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: App
      APP_PORT: 3000
      API_PORT: 5200

    steps:
      - uses: actions/checkout@v4

      - name: Build and run with docker compose
        run: |
          echo "Begin image build"
          docker compose --env-file /dev/null build
          echo "Starting container"
          docker compose --env-file /dev/null up
          echo "done"