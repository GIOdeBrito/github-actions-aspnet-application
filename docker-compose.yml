services:
    app:
        container_name: gh-aspnet-application
        build:
            context: ./app
            dockerfile: Dockerfile
        env_file: app/.env
        environment:
            ASPNETCORE_HTTP_PORTS: 8080
            ASPNETCORE_ENVIRONMENT: Development
            DOTNET_WATCH_RESTART_ON_RUDE_EDIT: "1"
            DOTNET_WATCH_LAUNCH_BROWSER: false
        ports:
            - "${APP_PORT}:8080"
        volumes:
            - ./app:/app
        tty: true
        command: dotnet watch run
        #command: sleep infinity
        #command: dotnet new web -o ${APP_NAME}

